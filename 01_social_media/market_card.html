<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    width:1200px; height:628px; overflow:hidden;
    background:#F8FAFC;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
                 "Segoe UI", "Helvetica Neue", Arial, sans-serif;
  }

  /* ── Outer card ── */
  .card {
    width:1200px; height:628px;
    background:#FFFFFF;
    border-radius:0;
    display:grid;
    grid-template-columns: 340px 1fr;
  }

  /* ══ LEFT PANEL ══ */
  .left {
    background: linear-gradient(160deg, #0F172A 0%, #1E3A5F 100%);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:40px 32px; gap:24px;
    position:relative; overflow:hidden;
  }
  /* subtle background glow */
  .left::before {
    content:''; position:absolute;
    width:260px; height:260px; border-radius:50%;
    background: radial-gradient(circle, rgba(59,130,246,0.25) 0%, transparent 70%);
    top:50%; left:50%; transform:translate(-50%,-50%);
  }

  .thumb {
    width:140px; height:140px; border-radius:16px;
    object-fit:cover;
    border:2px solid rgba(255,255,255,0.12);
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    position:relative; z-index:1;
  }
  .thumb-empty {
    width:140px; height:140px; border-radius:16px;
    background:rgba(255,255,255,0.06);
    border:2px solid rgba(255,255,255,0.10);
    display:flex; align-items:center; justify-content:center;
    position:relative; z-index:1;
  }
  .thumb-empty span { font-size:52px; color:rgba(255,255,255,0.2); font-weight:700; }

  /* Big stat block */
  .stat-block {
    text-align:center; position:relative; z-index:1;
  }
  .stat-pct {
    font-size:64px; font-weight:800; line-height:1;
    letter-spacing:-2px;
  }
  .stat-yes { color:#34D399; }
  .stat-no  { color:#F87171; }
  .stat-label {
    font-size:15px; color:rgba(255,255,255,0.50);
    margin-top:4px; letter-spacing:0.5px; text-transform:uppercase;
  }

  /* Change badge */
  .badge {
    display:inline-flex; align-items:center; gap:4px;
    padding:5px 12px; border-radius:20px;
    font-size:14px; font-weight:700;
    position:relative; z-index:1;
  }
  .badge-up { background:rgba(52,211,153,0.15); color:#34D399; }
  .badge-dn { background:rgba(248,113,113,0.15); color:#F87171; }

  /* Source */
  .source {
    font-size:12px; color:rgba(255,255,255,0.25);
    font-style:italic; position:relative; z-index:1;
  }

  /* ══ RIGHT PANEL ══ */
  .right {
    display:flex; flex-direction:column;
    padding:32px 44px 24px;
    gap:0;
  }
  .right-top { display:contents; }
  .right-bottom { display:contents; }

  /* Top meta */
  .meta {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:14px;
  }
  .meta-tag {
    font-size:12px; font-weight:600; color:#6366F1;
    background:#EEF2FF; padding:3px 10px; border-radius:20px;
    letter-spacing:0.3px;
  }
  .meta-vol {
    font-size:12px; color:#94A3B8;
  }

  /* Question */
  .question {
    font-size:22px; font-weight:700; color:#0F172A;
    line-height:1.4; margin-bottom:20px;
    flex-shrink:0;
  }

  /* Divider */
  .sep { height:1px; background:#F1F5F9; margin-bottom:16px; }

  /* Chart */
  .chart-wrap { height:210px; margin-bottom:16px; overflow:hidden; }

  /* Odds bar fallback (shown when no price history) */
  .odds-bar-wrap {
    flex:1; margin-bottom:16px;
    display:flex; flex-direction:column;
    justify-content:space-between;
    padding:8px 0 4px;
    gap:16px;
  }
  .odds-big-row {
    flex:1;
    display:flex; align-items:stretch; gap:0;
  }
  .odds-big-stat {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:6px;
  }
  .odds-divider {
    width:1px; background:#E2E8F0; margin:8px 0;
  }
  .odds-big-pct {
    font-size:52px; font-weight:900; line-height:1; letter-spacing:-2px;
  }
  .yes-color { color:#059669; }
  .no-color  { color:#DC2626; }
  .odds-big-label {
    font-size:13px; font-weight:700; color:#94A3B8;
    letter-spacing:1.5px; text-transform:uppercase;
  }
  .odds-big-payout {
    font-size:12px; color:#CBD5E1;
  }
  .odds-bar {
    display:flex; height:12px; border-radius:6px; overflow:hidden;
    flex-shrink:0;
  }
  .odds-fill { }
  .odds-fill-yes { background:linear-gradient(90deg,#059669,#10B981); }
  .odds-fill-no  { background:linear-gradient(90deg,#DC2626,#EF4444); }

  /* Buttons */
  .buttons { display:flex; gap:14px; margin-bottom:8px; }
  .btn {
    flex:1; height:52px; border-radius:10px; border:none;
    font-size:16px; font-weight:700; color:#fff;
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px; cursor:default;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .btn-yes { background:linear-gradient(135deg,#059669,#10B981); }
  .btn-no  { background:linear-gradient(135deg,#DC2626,#EF4444); }
  .btn-label { font-weight:700; }
  .btn-price { font-weight:600; opacity:0.9; font-size:15px; }

  /* Sub row */
  .sub-row { display:flex; gap:14px; margin-bottom:4px; }
  .sub { flex:1; text-align:center; font-size:12px; color:#CBD5E1; }

  /* Watermark */
  .watermark {
    text-align:right; font-size:11px; color:#E2E8F0;
    font-style:italic;
  }
</style>
</head>
