server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
        charset utf-8;
    }

    # Serve HTML with correct content type and charset
    location ~* \.html$ {
        add_header Content-Type "text/html; charset=utf-8";
    }
}
