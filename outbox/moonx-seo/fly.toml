# fly.toml app configuration file generated for moonx-seo on 2026-03-13T17:52:27+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'moonx-seo'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  NEXT_PUBLIC_SITE_URL = 'https://moonx-seo.fly.dev'
  NODE_ENV = 'production'
  POLYMARKET_API_BASE = 'https://gamma-api.polymarket.com'
  PORT = '3000'

[[mounts]]
  source = 'moonx_seo_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
