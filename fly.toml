# fly.toml app configuration file generated for moonx-lark-server on 2026-03-10T15:23:42+08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'moonx-lark-server'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "kol_data"
  destination = "/data"

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
